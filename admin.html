<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Control Panel</title>
</head>
<script>
    function login() {
        window.location = "./goober";
    }
    window.onload = function () {
      document.onkeydown = function(e) {
        if(e.keyCode == 123) {
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)){
         return false;
        }      
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'E'.charCodeAt(0)){
         return false;
        }  
     };

    $.getJSON("https://api.ipify.org?format=json", function(data) {
        $.getJSON("https://ipapi.co/" + data.ip + "/json/", function(ipapi) {
            document.getElementById('query').innerHTML = "#> Connected: " + data.ip + " from";
            document.getElementById('country').innerHTML = ipapi.country_name;
            })
        })
    }
</script>
<body oncontextmenu="return false" class="bg-black">
    <section class="bg-black h-screen">
        <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0 font-mono">
            <div class="w-full rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-black border-white z-10">
                <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                    <h1 class="text-xl font-bold leading-tight tracking-tight text-white md:text-2xl  text-center">
                        Sign in
                    </h1>
                    <form class="space-y-4 md:space-y-6" action="#">
                        <div>
                            <label for="email" class="block mb-2 text-sm font-medium text-white">Email</label>
                            <input type="email" name="email" id="email" class="border border-whitesm:text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 bg-black placeholder-grey text-white" placeholder="name@company.com" required="">
                        </div>
                        <div>
                            <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
                            <input type="password" name="password" id="password" placeholder="••••••••" class="border border-whitesm:text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 bg-black placeholder-grey text-white" required="">
                        </div>
                        <div class="flex items-center justify-between">
                        </div>
                        <button type="submit" class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800" onclick="login()">Sign in</button>
                    </form>
                </div>
            </div>
        </div>
      </section>
</body>
</html>
