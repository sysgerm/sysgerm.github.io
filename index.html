<script>
    window.onload = function () {
        // temp mail dont even care
        var requestUrl = "https://api.ipgeolocation.io/ipgeo?apiKey=df0ce2ef645340af9485c49218021ed2";
        $.ajax({
            url: requestUrl,
            type: 'GET',
            success: function(json)
            {
                document.getElementById('query').innerHTML = "#> Connected: " + json.ip + " from";
                document.getElementById('country').innerHTML = json.country_name;
            },
            }); 
      };
      
      document.onkeydown = function(e) {
        if(e.keyCode == 123) {
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){
         return false;
        }
    
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)){
         return false;
        }      
     };
</script>
