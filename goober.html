<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>L</title>
</head>
<script>
    window.onload = function () {
      document.onkeydown = function(e) {
        if(e.keyCode == 123) {
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){
         return false;
        }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){
         return false;
        }
    
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)){
         return false;
        }      
     };

    $.getJSON("https://api.ipify.org?format=json", function(data) {
        $.getJSON("https://ipapi.co/" + data.ip + "/json/", function(ipapi) {
            document.getElementById('query').innerHTML = "#> Connected: " + data.ip + " from";
            document.getElementById('country').innerHTML = ipapi.country_name;
            })
        })
    }
</script>
<body oncontextmenu="return false" class="bg-black">
    <div class="h-screen">
        <video autoplay loop muted class="fixed h-screen object-fill z-0 w-full"> 
            <source src="./assets/mp/hacker meme.mp4" class="" type="video/mp4"/>
        </video> 
        <audio controls autoplay loop class="hidden">
            <source src="./assets/mp/DaBaby - VIBEZ (Official Music Video).mp3" type="audio/mpeg">
          </audio> 
    </div>
</body>
</html>
